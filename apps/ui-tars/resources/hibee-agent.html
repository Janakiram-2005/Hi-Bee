<!DOCTYPE html>
<!--
  Hi-Bee Agent Chat — Vertex AI Agent Builder embedded chat window.
  Deployment: projects/229696319775/locations/us/apps/a7b38860-8742-4253-8e15-b5a358eaa2ac
              /deployments/eb2abb0a-bc8c-4107-84a7-a3333a106b90

  This page is loaded in a dedicated Electron BrowserWindow (hibeeAgentWindow).
  It uses the Google Chat Messenger SDK to provide a full conversational UI
  backed by the Vertex AI Agent Builder deployment.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hi-Bee Agent</title>

  <!-- Google Chat Messenger SDK -->
  <script defer src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js"></script>
  <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-default.css" />
  <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-layout.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Drag area (titlebar) ── */
    #drag-handle {
      -webkit-app-region: drag;
      height: 36px;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      border-bottom: 1px solid rgba(99, 102, 241, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-radius: 14px 14px 0 0;
    }

    #drag-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #a5b4fc;
      letter-spacing: 0.04em;
    }

    #drag-title .bee-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 0 6px #6366f1;
      animation: bee-pulse 1.8s ease-in-out infinite;
    }

    #close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    #close-btn:hover { color: #f87171; }

    /* ── Chat messenger wrapper ── */
    #chat-wrapper {
      width: 100%;
      height: calc(100% - 36px);
      background: #0d1117;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Force the chat-messenger to fill the wrapper */
    chat-messenger {
      width: 100%;
      height: 100%;
      display: block;
    }

    chat-messenger-container {
      height: 100%;
      border-radius: 0 0 14px 14px;
    }

    /* ── Status badge (loading indicator) ── */
    #loading-overlay {
      position: absolute;
      inset: 36px 0 0 0;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      border-radius: 0 0 14px 14px;
      transition: opacity 0.5s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-bee {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      animation: bee-bounce 1.2s ease-in-out infinite alternate;
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.5);
    }

    .loading-text {
      font-size: 13px;
      color: #6366f1;
      font-weight: 600;
      animation: bee-pulse 1.8s ease-in-out infinite;
    }

    /* ── Animations ── */
    @keyframes bee-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    @keyframes bee-bounce {
      from { transform: translateY(0px) scale(1); }
      to   { transform: translateY(-8px) scale(1.05); }
    }

    /* ── Override chat-messenger theme for dark mode ── */
    :root {
      --cm-primary-color: #6366f1;
      --cm-primary-bg: #0d1117;
      --cm-surface-bg: #161b22;
      --cm-text-primary: #e2e8f0;
      --cm-text-secondary: #94a3b8;
      --cm-border-color: rgba(99, 102, 241, 0.2);
      --cm-user-bubble-bg: #4338ca;
      --cm-bot-bubble-bg: #1e293b;
      --cm-input-bg: #161b22;
    }
  </style>
</head>
<body>
  <!-- Draggable title bar -->
  <div id="drag-handle">
    <div id="drag-title">
      <span class="bee-dot"></span>
      Hi-Bee AI Agent
    </div>
    <button id="close-btn" title="Close" onclick="window.close()">✕</button>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loading-bee">🐝</div>
    <div class="loading-text">Connecting to Hi-Bee…</div>
  </div>

  <!-- Chat Messenger widget -->
  <div id="chat-wrapper">
    <chat-messenger url-allowlist="*">
      <chat-messenger-container
        chat-title="Hi-Bee"
        chat-title-icon="https://gstatic.com/dialogflow-console/common/assets/ccai-favicons/conversational_agents.png"
        enable-file-upload
        enable-audio-input
      >
        <chat-reset-session-button
          slot="titlebar-actions"
          title-text="Start new chat"
        ></chat-reset-session-button>
        <chat-toggle-dialog-button
          slot="titlebar-actions"
          title-text-expanded="Collapse"
          title-text-collapsed="Expand"
        ></chat-toggle-dialog-button>
      </chat-messenger-container>
    </chat-messenger>
  </div>

  <script>
    // ── Register the Vertex AI Agent Builder deployment ──────────────────────
    window.addEventListener('chat-messenger-loaded', () => {
      try {
        chatSdk.registerContext(
          chatSdk.prebuilts.ces.createContext({
            deploymentName:
              'projects/229696319775/locations/us/apps/a7b38860-8742-4253-8e15-b5a358eaa2ac/deployments/eb2abb0a-bc8c-4107-84a7-a3333a106b90',
          }),
        );

        // Hide loading overlay once SDK is ready
        setTimeout(() => {
          const overlay = document.getElementById('loading-overlay');
          if (overlay) overlay.classList.add('hidden');
        }, 1200);

        console.log('[Hi-Bee] Chat Messenger SDK loaded and deployment registered.');
      } catch (err) {
        console.error('[Hi-Bee] Failed to register chat-messenger context:', err);
        const overlay = document.getElementById('loading-overlay');
        if (overlay) {
          overlay.querySelector('.loading-text').textContent = 'Connection failed. Check network.';
        }
      }
    });

    // ── Electron window drag fix ─────────────────────────────────────────────
    // Prevent drag-region clicks from propagating to chat elements
    document.getElementById('drag-handle')?.addEventListener('dblclick', () => {
      // Double-click title bar to toggle minimize
      try { window.electronAPI?.toggleMinimize?.(); } catch (_) {}
    });

    // ── Auto-open chat when window is ready ──────────────────────────────────
    window.addEventListener('chat-messenger-loaded', () => {
      setTimeout(() => {
        const cm = document.querySelector('chat-messenger');
        if (cm && typeof cm.open === 'function') {
          cm.open();
        }

        if (cm) {
          const handleResponse = (event) => {
            console.log('[Hi-Bee] Received response-received event:', event);
            try {
              const messages = event.detail?.response?.queryResult?.responseMessages;
              if (messages && messages.length > 0) {
                const text = messages
                  .map(m => m.text?.text?.[0])
                  .filter(Boolean)
                  .join(' ');
                if (text) {
                  console.log('[Hi-Bee] Speaking response via IPC:', text);
                  window.electron.ipcRenderer.invoke('voice:speak', text).catch(() => {});
                }
                return;
              }

              if (event.detail?.responseMessage?.text) {
                const text = event.detail.responseMessage.text;
                window.electron.ipcRenderer.invoke('voice:speak', text).catch(() => {});
                return;
              }

              if (event.detail?.message?.text) {
                const text = event.detail.message.text;
                window.electron.ipcRenderer.invoke('voice:speak', text).catch(() => {});
                return;
              }
            } catch (err) {
              console.error('[Hi-Bee] Error extracting text from response event:', err);
            }
          };

          cm.addEventListener('df-response-received', handleResponse);
          cm.addEventListener('response-received', handleResponse);
          cm.addEventListener('message-received', handleResponse);
        }
      }, 500);
    });
  </script>
</body>
</html>
